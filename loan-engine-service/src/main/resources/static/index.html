<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>이자계산</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --border: #e2e5ea;
    --text: #1c1f26;
    --muted: #6b7280;
    --accent: #2f6fed;
    --accent-bg: #eaf1ff;
    --danger: #d9483f;
    --danger-bg: #fdecea;
    --good: #1a7f4f;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 32px 16px 80px;
  }
  .container { max-width: 880px; margin: 0 auto; }
  h1 { font-size: 22px; margin: 0 0 20px; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .card h2 { font-size: 15px; margin: 0 0 16px; color: var(--muted); font-weight: 600; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px 20px;
  }
  .field label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    background: #fff;
  }
  .field input[readonly] {
    background: #f2f3f5;
    color: var(--muted);
  }
  .rate-pair { display: flex; gap: 8px; align-items: center; }
  .rate-pair input { width: 100%; }
  .rate-pair span { color: var(--muted); font-size: 13px; white-space: nowrap; }
  button.primary {
    margin-top: 20px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button.primary:hover { filter: brightness(1.05); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab-btn {
    flex: 1;
    padding: 10px 12px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
  }
  .tab-btn.active {
    background: var(--accent-bg);
    border-color: var(--accent);
    color: var(--accent);
  }

  table.result-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.result-table td { padding: 10px 6px; border-bottom: 1px solid var(--border); }
  table.result-table td.label { color: var(--muted); width: 45%; }
  table.result-table td.value { text-align: right; font-variant-numeric: tabular-nums; }
  table.result-table tr.total td { border-top: 2px solid var(--text); border-bottom: none; font-weight: 700; padding-top: 14px; }
  .badge { display: inline-block; margin-left: 6px; padding: 1px 6px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge.overdue { background: var(--danger-bg); color: var(--danger); }
  .badge.prepay { background: var(--accent-bg); color: var(--accent); }
  .badge.ontime { background: #eef7f0; color: var(--good); }
  .meta { color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .error { color: var(--danger); font-size: 13px; margin-top: 10px; display: none; }
  .placeholder { color: var(--muted); font-size: 14px; text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<div class="container">
  <h1>이자계산</h1>

  <div class="card">
    <h2>입력</h2>
    <div class="grid">
      <div class="field">
        <label for="newDate">신규일자</label>
        <input type="date" id="newDate" />
      </div>
      <div class="field">
        <label for="maturityDate">만기일자</label>
        <input type="date" id="maturityDate" />
      </div>
      <div class="field">
        <label for="termMonths">거치개월 (만기 - 신규)</label>
        <input type="text" id="termMonths" readonly placeholder="자동 계산" />
      </div>
      <div class="field">
        <label for="referenceDate">기준일자</label>
        <input type="date" id="referenceDate" />
      </div>
      <div class="field">
        <label>적용금리 (기준금리 + 가산금리)</label>
        <div class="rate-pair">
          <input type="number" id="baseRate" step="0.01" placeholder="기준금리 %" />
          <span>+</span>
          <input type="number" id="spreadRate" step="0.01" placeholder="가산금리 %" />
          <span>=</span>
          <input type="text" id="appliedRate" readonly placeholder="%" style="max-width:90px" />
        </div>
      </div>
      <div class="field">
        <label for="outstandingPrincipal">대출잔액 (원)</label>
        <input type="number" id="outstandingPrincipal" step="1" placeholder="예: 100000000" />
      </div>
    </div>
    <button class="primary" id="calcBtn">계산하기</button>
    <div class="error" id="errorBox"></div>
  </div>

  <div class="card">
    <h2>결과</h2>
    <div class="tabs">
      <button class="tab-btn active" data-type="EQUAL_PRINCIPAL_AND_INTEREST">원리금균등상환</button>
      <button class="tab-btn" data-type="EQUAL_PRINCIPAL">원금균등상환</button>
      <button class="tab-btn" data-type="BULK">만기일시상환</button>
    </div>
    <div id="resultArea"><div class="placeholder">좌측 입력 후 계산하기를 눌러주세요.</div></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let lastResponse = null;
let activeType = 'EQUAL_PRINCIPAL_AND_INTEREST';

function monthsBetween(a, b) {
  if (!a || !b) return null;
  const d1 = new Date(a), d2 = new Date(b);
  let months = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
  if (d2.getDate() < d1.getDate()) months -= 1;
  return months;
}

function updateDerivedFields() {
  const nd = $('newDate').value, md = $('maturityDate').value;
  const term = monthsBetween(nd, md);
  $('termMonths').value = (term !== null && term > 0) ? term + ' 개월' : '';

  const base = parseFloat($('baseRate').value);
  const spread = parseFloat($('spreadRate').value);
  if (!isNaN(base) && !isNaN(spread)) {
    $('appliedRate').value = (base + spread).toFixed(2) + '%';
  } else {
    $('appliedRate').value = '';
  }
}

['newDate', 'maturityDate', 'baseRate', 'spreadRate'].forEach(id => {
  $(id).addEventListener('input', updateDerivedFields);
});

function formatWon(v) {
  const n = Number(v);
  return n.toLocaleString('ko-KR') + '원';
}

function renderResult(type) {
  if (!lastResponse) return;
  const r = lastResponse.results.find(x => x.repaymentType === type);
  if (!r) return;

  let overdueBadge = '';
  if (r.overdueDays > 0) {
    overdueBadge = `<span class="badge overdue">연체 ${r.overdueDays}일</span>`;
  } else if (r.prepaymentDays > 0) {
    overdueBadge = `<span class="badge prepay">선납 ${r.prepaymentDays}일</span>`;
  } else {
    overdueBadge = `<span class="badge ontime">정시납부</span>`;
  }

  const html = `
    <div class="meta">
      납부(약정)일자: <strong>${r.dueDate}</strong> · 잔여회차: ${r.remainingInstallments}회 ${overdueBadge}
    </div>
    <table class="result-table">
      <tr><td class="label">원금</td><td class="value">${formatWon(r.principal)}</td></tr>
      <tr><td class="label">원금연체이자</td><td class="value">${formatWon(r.overduePrincipalInterest)}</td></tr>
      <tr><td class="label">이자</td><td class="value">${formatWon(r.interest)}</td></tr>
      <tr><td class="label">연체이자</td><td class="value">${formatWon(r.overdueInterest)}</td></tr>
      <tr><td class="label">선납이자 (선납일수 ${r.prepaymentDays}일)</td><td class="value">- ${formatWon(r.prepaymentInterest)}</td></tr>
      <tr><td class="label">중도상환수수료</td><td class="value">${formatWon(r.earlyRepaymentFee)}</td></tr>
      <tr class="total"><td class="label">기준일자 납부금액</td><td class="value">${formatWon(r.totalDueAmount)}</td></tr>
    </table>
  `;
  $('resultArea').innerHTML = html;
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeType = btn.dataset.type;
    renderResult(activeType);
  });
});

$('calcBtn').addEventListener('click', async () => {
  $('errorBox').style.display = 'none';
  const payload = {
    newDate: $('newDate').value,
    maturityDate: $('maturityDate').value,
    baseRate: parseFloat($('baseRate').value) / 100,
    spreadRate: parseFloat($('spreadRate').value) / 100,
    outstandingPrincipal: parseFloat($('outstandingPrincipal').value),
    referenceDate: $('referenceDate').value
  };

  if (!payload.newDate || !payload.maturityDate || !payload.referenceDate ||
      isNaN(payload.baseRate) || isNaN(payload.spreadRate) || isNaN(payload.outstandingPrincipal)) {
    $('errorBox').textContent = '모든 입력값을 채워주세요.';
    $('errorBox').style.display = 'block';
    return;
  }

  $('calcBtn').disabled = true;
  try {
    const res = await fetch('/api/v1/interest-calculations', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) {
      throw new Error(data.message || '계산 중 오류가 발생했습니다.');
    }
    lastResponse = data;
    renderResult(activeType);
  } catch (e) {
    $('errorBox').textContent = e.message;
    $('errorBox').style.display = 'block';
  } finally {
    $('calcBtn').disabled = false;
  }
});
</script>
</body>
</html>
