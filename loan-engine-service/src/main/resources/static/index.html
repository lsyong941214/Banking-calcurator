<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>이자계산</title>
<style>
  /* Toss TDS-derived tokens (see DESIGN.md) */
  :root {
    --color-primary: #3182f6;
    --color-primary-hover: #2272eb;
    --color-canvas: #ffffff;
    --color-foreground: #191f28;
    --color-body: #4e5968;
    --color-muted: #8b95a1;
    --color-surface: #f2f4f6;
    --color-border: #e5e8eb;
    --color-on-primary: #ffffff;
    --color-weak-bg: #e8f3ff;
    --color-weak-fg: #1b64da;
    --color-danger: #e42939;
    --color-danger-weak-bg: #fdecea;

    --font-sans: "Toss Product Sans", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;

    --space-xs: 4px; --space-sm: 6px; --space-md: 8px; --space-lg: 16px; --space-xl: 24px; --space-xxl: 32px;
    --radius-sm: 4px; --radius-md: 6px; --radius-btn-md: 10px; --radius-btn-lg: 14px; --radius-btn-xl: 16px;
    --radius-card: 14px;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--font-sans);
    background: var(--color-surface);
    color: var(--color-foreground);
  }

  .app-shell { display: flex; min-height: 100vh; }

  /* --- Sidebar --- */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--color-canvas);
    border-right: 1px solid var(--color-border);
    padding: var(--space-xl) var(--space-lg);
  }
  .sidebar .brand {
    font-size: 20px;
    font-weight: 700;
    color: var(--color-foreground);
    margin-bottom: var(--space-xxl);
    padding: 0 var(--space-md);
  }
  .nav-item {
    display: block;
    width: 100%;
    text-align: left;
    background: none;
    border: none;
    font-family: var(--font-sans);
    font-size: 15px;
    font-weight: 600;
    color: var(--color-body);
    padding: 12px var(--space-md);
    border-radius: var(--radius-btn-md);
    cursor: pointer;
    margin-bottom: var(--space-xs);
  }
  .nav-item:hover { background: var(--color-surface); }
  .nav-item.active { background: var(--color-weak-bg); color: var(--color-weak-fg); }

  /* --- Main content --- */
  .content { flex: 1; padding: var(--space-xxl) var(--space-xxl) 80px; max-width: 920px; }
  .view { display: none; }
  .view.active { display: block; }

  h1 { font-size: 24px; font-weight: 600; line-height: 36px; margin: 0 0 var(--space-xl); color: var(--color-foreground); }

  .card {
    background: var(--color-canvas);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-card);
    padding: var(--space-xl);
    margin-bottom: var(--space-lg);
  }
  .card h2 { font-size: 14px; font-weight: 600; margin: 0 0 var(--space-lg); color: var(--color-muted); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: var(--space-lg) 20px;
  }
  .field label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--color-body);
    margin-bottom: var(--space-sm);
  }
  .field input {
    width: 100%;
    height: 44px;
    padding: 0 12px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 15px;
    font-family: var(--font-sans);
    background: var(--color-canvas);
    color: var(--color-foreground);
  }
  .field input:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(49, 130, 246, 0.15);
  }
  .field input[readonly] { background: var(--color-surface); color: var(--color-muted); }
  .field input:disabled { background: var(--color-surface); color: var(--color-muted); }
  .field select {
    width: 100%;
    height: 44px;
    padding: 0 12px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    font-size: 15px;
    font-family: var(--font-sans);
    background: var(--color-canvas);
    color: var(--color-foreground);
  }
  .field select:focus {
    outline: none;
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(49, 130, 246, 0.15);
  }

  .rate-pair { display: flex; gap: var(--space-md); align-items: center; }
  .rate-pair input { width: 100%; }
  .rate-pair span { color: var(--color-muted); font-size: 13px; white-space: nowrap; }

  .checkbox-label {
    display: flex; align-items: center; gap: var(--space-sm);
    font-size: 13px; font-weight: 600; color: var(--color-body);
    white-space: nowrap; cursor: pointer;
  }
  .checkbox-label input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--color-primary); cursor: pointer; }

  button.primary {
    margin-top: var(--space-xl);
    background: var(--color-primary);
    color: var(--color-on-primary);
    border: none;
    border-radius: var(--radius-btn-xl);
    height: 56px;
    padding: 0 20px;
    font-family: var(--font-sans);
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
  }
  button.primary:hover { background: var(--color-primary-hover); }
  button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

  .tabs { display: flex; gap: var(--space-md); margin-bottom: var(--space-lg); }
  .tab-btn {
    flex: 1;
    height: 44px;
    padding: 0 12px;
    border: 1px solid var(--color-border);
    background: var(--color-canvas);
    border-radius: var(--radius-btn-md);
    font-family: var(--font-sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--color-muted);
    cursor: pointer;
  }
  .tab-btn.active { background: var(--color-weak-bg); border-color: var(--color-primary); color: var(--color-weak-fg); }
  .tab-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .tab-btn:disabled.active { background: var(--color-surface); border-color: var(--color-border); color: var(--color-muted); }

  .fee-notice { color: var(--color-danger); font-size: 12px; margin-top: 4px; }

  table.result-table { width: 100%; border-collapse: collapse; font-size: 15px; }
  table.result-table td { padding: 12px 6px; border-bottom: 1px solid var(--color-border); }
  table.result-table td.label { color: var(--color-body); width: 45%; }
  table.result-table td.value { text-align: right; font-variant-numeric: tabular-nums; }
  table.result-table tr.total td { border-top: 2px solid var(--color-foreground); border-bottom: none; font-weight: 700; padding-top: 16px; font-size: 17px; }

  .badge { display: inline-block; margin-left: var(--space-sm); padding: 2px 8px; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; }
  .badge.overdue { background: var(--color-danger-weak-bg); color: var(--color-danger); }
  .badge.prepay { background: var(--color-weak-bg); color: var(--color-weak-fg); }
  .badge.ontime { background: var(--color-surface); color: var(--color-body); }

  .meta { color: var(--color-body); font-size: 14px; margin-bottom: var(--space-lg); }
  .error { color: var(--color-danger); font-size: 13px; margin-top: var(--space-md); display: none; }
  .placeholder { color: var(--color-muted); font-size: 14px; text-align: center; padding: 48px 0; }

  .schedule-table-wrap { max-height: 480px; overflow-y: auto; border: 1px solid var(--color-border); border-radius: var(--radius-md); }
  table.schedule-table { width: 100%; border-collapse: collapse; font-size: 14px; }
  table.schedule-table thead th {
    position: sticky; top: 0;
    background: var(--color-surface);
    color: var(--color-body);
    font-weight: 600;
    text-align: right;
    padding: 10px 12px;
    border-bottom: 1px solid var(--color-border);
  }
  table.schedule-table thead th:first-child,
  table.schedule-table thead th:nth-child(2) { text-align: left; }
  table.schedule-table tbody td {
    padding: 9px 12px;
    text-align: right;
    border-bottom: 1px solid var(--color-border);
    font-variant-numeric: tabular-nums;
    color: var(--color-foreground);
  }
  table.schedule-table tbody td:first-child,
  table.schedule-table tbody td:nth-child(2) { text-align: left; color: var(--color-body); }
  table.schedule-table tbody tr:last-child td { font-weight: 700; }
</style>
</head>
<body>
<div class="app-shell">
  <nav class="sidebar">
    <div class="brand">대출계산기</div>
    <button class="nav-item active" data-view="interest">이자계산</button>
    <button class="nav-item" data-view="schedule">상환스케줄 보기</button>
  </nav>

  <main class="content">

    <!-- ===================== 이자계산 ===================== -->
    <section id="view-interest" class="view active">
      <h1>이자계산</h1>

      <div class="card">
        <h2>입력</h2>
        <div class="grid">
          <div class="field">
            <label for="i-newDate">신규일자</label>
            <input type="date" id="i-newDate" />
          </div>
          <div class="field">
            <label for="i-maturityDate">만기일자</label>
            <input type="date" id="i-maturityDate" />
          </div>
          <div class="field">
            <label for="i-termMonths">거치개월 (만기 - 신규)</label>
            <input type="text" id="i-termMonths" readonly placeholder="자동 계산" />
          </div>
          <div class="field">
            <label for="i-referenceDate">기준일자</label>
            <input type="date" id="i-referenceDate" />
          </div>
          <div class="field">
            <label>적용금리 (기준금리 + 가산금리)</label>
            <div class="rate-pair">
              <input type="text" inputmode="decimal" id="i-baseRate" placeholder="0.00%" />
              <span>+</span>
              <input type="text" inputmode="decimal" id="i-spreadRate" placeholder="0.00%" />
              <span>=</span>
              <input type="text" id="i-appliedRate" readonly placeholder="0.00%" style="max-width:90px" />
            </div>
          </div>
          <div class="field">
            <label for="i-productType">상품</label>
            <select id="i-productType">
              <option value="01">주택담보대출</option>
              <option value="02">전세자금대출</option>
              <option value="03">신용대출</option>
            </select>
          </div>
          <div class="field">
            <label for="i-outstandingPrincipal">대출잔액 (원)</label>
            <input type="text" inputmode="numeric" id="i-outstandingPrincipal" placeholder="예: 100,000,000" />
          </div>
          <div class="field">
            <label for="i-partialRepaymentAmount">일부상환금액 (원)</label>
            <input type="text" inputmode="numeric" id="i-partialRepaymentAmount" placeholder="예: 10,000,000" />
          </div>
          <div class="field">
            <label>중도상환수수료율 (%)</label>
            <div class="rate-pair">
              <input type="text" inputmode="decimal" id="i-feeRate" value="1" />
              <label class="checkbox-label"><input type="checkbox" id="i-feeExempt" /> 면제</label>
            </div>
          </div>
        </div>
        <button class="primary" id="i-calcBtn">계산하기</button>
        <div class="error" id="i-errorBox"></div>
      </div>

      <div class="card">
        <h2>결과</h2>
        <div class="tabs">
          <button class="tab-btn active" data-type="EQUAL_PRINCIPAL_AND_INTEREST">원리금균등상환</button>
          <button class="tab-btn" data-type="EQUAL_PRINCIPAL">원금균등상환</button>
          <button class="tab-btn" data-type="BULK">만기일시상환</button>
        </div>
        <div id="i-resultArea"><div class="placeholder">좌측 입력 후 계산하기를 눌러주세요.</div></div>
      </div>
    </section>

    <!-- ===================== 상환스케줄 보기 ===================== -->
    <section id="view-schedule" class="view">
      <h1>상환스케줄 보기</h1>

      <div class="card">
        <h2>입력</h2>
        <div class="grid">
          <div class="field">
            <label for="s-newDate">신규일자</label>
            <input type="date" id="s-newDate" />
          </div>
          <div class="field">
            <label for="s-maturityDate">만기일자</label>
            <input type="date" id="s-maturityDate" />
          </div>
          <div class="field">
            <label for="s-termMonths">거치개월 (만기 - 신규)</label>
            <input type="text" id="s-termMonths" readonly placeholder="자동 계산" />
          </div>
          <div class="field">
            <label>적용금리 (기준금리 + 가산금리)</label>
            <div class="rate-pair">
              <input type="text" inputmode="decimal" id="s-baseRate" placeholder="0.00%" />
              <span>+</span>
              <input type="text" inputmode="decimal" id="s-spreadRate" placeholder="0.00%" />
              <span>=</span>
              <input type="text" id="s-appliedRate" readonly placeholder="0.00%" style="max-width:90px" />
            </div>
          </div>
          <div class="field">
            <label for="s-principal">대출원금 (원)</label>
            <input type="text" inputmode="numeric" id="s-principal" placeholder="예: 100,000,000" />
          </div>
        </div>
        <button class="primary" id="s-calcBtn">조회하기</button>
        <div class="error" id="s-errorBox"></div>
      </div>

      <div class="card">
        <h2>결과</h2>
        <div class="tabs">
          <button class="tab-btn active" data-type="EQUAL_PRINCIPAL_AND_INTEREST">원리금균등상환</button>
          <button class="tab-btn" data-type="EQUAL_PRINCIPAL">원금균등상환</button>
          <button class="tab-btn" data-type="BULK">만기일시상환</button>
        </div>
        <div id="s-resultArea"><div class="placeholder">좌측 입력 후 조회하기를 눌러주세요.</div></div>
      </div>
    </section>

  </main>
</div>

<script>
const $ = (id) => document.getElementById(id);

function monthsBetween(a, b) {
  if (!a || !b) return null;
  const d1 = new Date(a), d2 = new Date(b);
  let months = (d2.getFullYear() - d1.getFullYear()) * 12 + (d2.getMonth() - d1.getMonth());
  if (d2.getDate() < d1.getDate()) months -= 1;
  return months;
}

function formatWon(v) {
  return Number(v).toLocaleString('ko-KR') + '원';
}

function attachAmountFormatting(input) {
  input.addEventListener('input', () => {
    const raw = input.value.replace(/[^0-9]/g, '');
    input.value = raw ? Number(raw).toLocaleString('ko-KR') : '';
  });
}

function parseAmount(input) {
  const raw = input.value.replace(/[^0-9]/g, '');
  return raw ? Number(raw) : NaN;
}

// 숫자와 소수점만 허용, 소수점 이하 2자리까지만 입력 가능
function attachRateFormatting(input) {
  input.addEventListener('input', () => {
    let v = input.value.replace(/[^0-9.]/g, '');
    const firstDot = v.indexOf('.');
    if (firstDot !== -1) {
      v = v.slice(0, firstDot + 1) + v.slice(firstDot + 1).replace(/\./g, '');
      v = v.slice(0, firstDot + 3);
    }
    input.value = v;
  });
}

function isoDate(d) {
  return d.toISOString().slice(0, 10);
}

// ---------- Sidebar navigation ----------
document.querySelectorAll('.nav-item').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    btn.classList.add('active');
    $('view-' + btn.dataset.view).classList.add('active');
  });
});

// ================= 이자계산 view =================
(function () {
  let lastResponse = null;
  let activeType = 'EQUAL_PRINCIPAL_AND_INTEREST';

  attachAmountFormatting($('i-outstandingPrincipal'));
  attachAmountFormatting($('i-partialRepaymentAmount'));
  attachRateFormatting($('i-baseRate'));
  attachRateFormatting($('i-spreadRate'));
  attachRateFormatting($('i-feeRate'));

  // 상품별 선택 가능한 상환방식 제한: 주택담보대출(01)은 만기일시상환 불가,
  // 전세자금대출(02)은 만기일시상환만 가능, 신용대출(03)은 전체 가능.
  const PRODUCT_ALLOWED_TYPES = {
    '01': ['EQUAL_PRINCIPAL_AND_INTEREST', 'EQUAL_PRINCIPAL'],
    '02': ['BULK'],
    '03': ['EQUAL_PRINCIPAL_AND_INTEREST', 'EQUAL_PRINCIPAL', 'BULK']
  };

  function switchTab(type) {
    document.querySelectorAll('#view-interest .tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.type === type);
    });
    activeType = type;
    renderResult(activeType);
  }

  function applyProductRestrictions() {
    const allowed = PRODUCT_ALLOWED_TYPES[$('i-productType').value] || [];
    document.querySelectorAll('#view-interest .tab-btn').forEach(btn => {
      btn.disabled = !allowed.includes(btn.dataset.type);
    });
    if (!allowed.includes(activeType)) {
      switchTab(allowed[0]);
    }
  }

  $('i-productType').addEventListener('change', applyProductRestrictions);

  const today = new Date();
  const maturityDefault = new Date(today);
  maturityDefault.setFullYear(maturityDefault.getFullYear() + 1);
  const referenceDefault = new Date(today);
  referenceDefault.setMonth(referenceDefault.getMonth() + 1);
  $('i-maturityDate').value = isoDate(maturityDefault);
  $('i-referenceDate').value = isoDate(referenceDefault);

  function updateDerivedFields() {
    const term = monthsBetween($('i-newDate').value, $('i-maturityDate').value);
    $('i-termMonths').value = (term !== null && term > 0) ? term + ' 개월' : '';

    const base = parseFloat($('i-baseRate').value);
    const spread = parseFloat($('i-spreadRate').value);
    $('i-appliedRate').value = (!isNaN(base) && !isNaN(spread)) ? (base + spread).toFixed(2) + '%' : '';
  }
  ['i-newDate', 'i-maturityDate', 'i-baseRate', 'i-spreadRate'].forEach(id => {
    $(id).addEventListener('input', updateDerivedFields);
  });
  updateDerivedFields();
  applyProductRestrictions();

  $('i-feeExempt').addEventListener('change', () => {
    if ($('i-feeExempt').checked) {
      $('i-feeRate').value = '0';
      $('i-feeRate').disabled = true;
    } else {
      $('i-feeRate').value = '1';
      $('i-feeRate').disabled = false;
    }
  });

  const EXEMPTION_LABELS = {
    THREE_YEARS_ELAPSED: '① 대출 후 3년 경과 - 중도상환수수료 전액 면제',
    ANNUAL_TEN_PERCENT: '② 대출원금 10% 이내 일부상환 - 중도상환수수료 면제'
  };

  function renderResult(type) {
    if (!lastResponse) return;
    const r = lastResponse.results.find(x => x.repaymentType === type);
    if (!r) return;

    let badge;
    if (r.overdueDays > 0) badge = `<span class="badge overdue">연체 ${r.overdueDays}일</span>`;
    else if (r.prepaymentDays > 0) badge = `<span class="badge prepay">선납 ${r.prepaymentDays}일</span>`;
    else badge = `<span class="badge ontime">정시납부</span>`;

    let feeNotices = '';
    const exemptionLabel = EXEMPTION_LABELS[lastResponse.earlyRepaymentFeeExemptionReason];
    if (exemptionLabel) feeNotices += `<div class="fee-notice">${exemptionLabel}</div>`;
    if (lastResponse.withdrawalPeriodApplicable) feeNotices += `<div class="fee-notice">* 청약철회 가능여부 확인</div>`;

    $('i-resultArea').innerHTML = `
      <div class="meta">납부(약정)일자: <strong>${r.dueDate}</strong> · 회차수: ${r.remainingInstallments}회 ${badge}</div>
      <table class="result-table">
        <tr><td class="label">원금</td><td class="value">${formatWon(r.principal)}</td></tr>
        <tr><td class="label">원금연체이자</td><td class="value">${formatWon(r.overduePrincipalInterest)}</td></tr>
        <tr><td class="label">이자</td><td class="value">${formatWon(r.interest)}</td></tr>
        <tr><td class="label">연체이자</td><td class="value">${formatWon(r.overdueInterest)}</td></tr>
        <tr><td class="label">선납이자 (선납일수 ${r.prepaymentDays}일)</td><td class="value">- ${formatWon(r.prepaymentInterest)}</td></tr>
        <tr><td class="label">중도상환수수료</td><td class="value">${formatWon(r.earlyRepaymentFee)}${feeNotices}</td></tr>
        <tr class="total"><td class="label">기준일자 납부금액</td><td class="value">${formatWon(r.totalDueAmount)}</td></tr>
      </table>
    `;
  }

  document.querySelectorAll('#view-interest .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => switchTab(btn.dataset.type));
  });

  $('i-calcBtn').addEventListener('click', async () => {
    $('i-errorBox').style.display = 'none';
    const payload = {
      newDate: $('i-newDate').value,
      maturityDate: $('i-maturityDate').value,
      baseRate: parseFloat($('i-baseRate').value) / 100,
      spreadRate: parseFloat($('i-spreadRate').value) / 100,
      outstandingPrincipal: parseAmount($('i-outstandingPrincipal')),
      referenceDate: $('i-referenceDate').value,
      earlyRepaymentFeeRate: parseFloat($('i-feeRate').value) / 100,
      partialRepaymentAmount: parseAmount($('i-partialRepaymentAmount'))
    };

    if (!payload.newDate || !payload.maturityDate || !payload.referenceDate ||
        isNaN(payload.baseRate) || isNaN(payload.spreadRate) || isNaN(payload.outstandingPrincipal) ||
        isNaN(payload.partialRepaymentAmount)) {
      $('i-errorBox').textContent = '모든 입력값을 채워주세요.';
      $('i-errorBox').style.display = 'block';
      return;
    }

    $('i-calcBtn').disabled = true;
    try {
      const res = await fetch('/api/v1/interest-calculations', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || '계산 중 오류가 발생했습니다.');
      lastResponse = data;
      renderResult(activeType);
    } catch (e) {
      $('i-errorBox').textContent = e.message;
      $('i-errorBox').style.display = 'block';
    } finally {
      $('i-calcBtn').disabled = false;
    }
  });
})();

// ================= 상환스케줄 보기 view =================
(function () {
  let lastResponse = null;
  let activeType = 'EQUAL_PRINCIPAL_AND_INTEREST';

  attachAmountFormatting($('s-principal'));
  attachRateFormatting($('s-baseRate'));
  attachRateFormatting($('s-spreadRate'));

  const maturityDefault = new Date();
  maturityDefault.setFullYear(maturityDefault.getFullYear() + 1);
  $('s-maturityDate').value = isoDate(maturityDefault);

  function updateDerivedFields() {
    const term = monthsBetween($('s-newDate').value, $('s-maturityDate').value);
    $('s-termMonths').value = (term !== null && term > 0) ? term + ' 개월' : '';

    const base = parseFloat($('s-baseRate').value);
    const spread = parseFloat($('s-spreadRate').value);
    $('s-appliedRate').value = (!isNaN(base) && !isNaN(spread)) ? (base + spread).toFixed(2) + '%' : '';
  }
  ['s-newDate', 's-maturityDate', 's-baseRate', 's-spreadRate'].forEach(id => {
    $(id).addEventListener('input', updateDerivedFields);
  });
  updateDerivedFields();

  function renderResult(type) {
    if (!lastResponse) return;
    const r = lastResponse.results.find(x => x.repaymentType === type);
    if (!r) return;

    const rows = r.installments.map(row => `
      <tr>
        <td>${row.sequence}회</td>
        <td>${row.dueDate}</td>
        <td>${formatWon(row.principalPayment)}</td>
        <td>${formatWon(row.interestPayment)}</td>
        <td>${formatWon(row.totalPayment)}</td>
        <td>${formatWon(row.remainingBalance)}</td>
      </tr>
    `).join('');

    $('s-resultArea').innerHTML = `
      <div class="meta">총 ${r.installments.length}회차</div>
      <div class="schedule-table-wrap">
        <table class="schedule-table">
          <thead>
            <tr><th>회차</th><th>납부일</th><th>원금</th><th>이자</th><th>납입액</th><th>잔액</th></tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    `;
  }

  document.querySelectorAll('#view-schedule .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#view-schedule .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeType = btn.dataset.type;
      renderResult(activeType);
    });
  });

  $('s-calcBtn').addEventListener('click', async () => {
    $('s-errorBox').style.display = 'none';
    const payload = {
      newDate: $('s-newDate').value,
      maturityDate: $('s-maturityDate').value,
      baseRate: parseFloat($('s-baseRate').value) / 100,
      spreadRate: parseFloat($('s-spreadRate').value) / 100,
      principal: parseAmount($('s-principal'))
    };

    if (!payload.newDate || !payload.maturityDate ||
        isNaN(payload.baseRate) || isNaN(payload.spreadRate) || isNaN(payload.principal)) {
      $('s-errorBox').textContent = '모든 입력값을 채워주세요.';
      $('s-errorBox').style.display = 'block';
      return;
    }

    $('s-calcBtn').disabled = true;
    try {
      const res = await fetch('/api/v1/repayment-schedules', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.message || '조회 중 오류가 발생했습니다.');
      lastResponse = data;
      renderResult(activeType);
    } catch (e) {
      $('s-errorBox').textContent = e.message;
      $('s-errorBox').style.display = 'block';
    } finally {
      $('s-calcBtn').disabled = false;
    }
  });
})();
</script>
</body>
</html>
